version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kodigo_db
    environment:
      POSTGRES_USER: kodigo_user
      POSTGRES_PASSWORD: kodigo_password
      POSTGRES_DB: kodigo_issues
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kodigo_user -d kodigo_issues"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: kodigo_backend
    environment:
      DATABASE_URL: "postgresql://kodigo_user:kodigo_password@db:5432/kodigo_issues?schema=public"
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: kodigo_frontend
    environment:
      VITE_API_URL: "http://localhost:3000"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
